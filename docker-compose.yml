services:
  postgres:
    image: postgres:16-alpine
    container_name: teamlinks-db
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - teamlinks-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.50

  api:
    build: .
    container_name: teamlinks-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      TEAMLINKS_SHORTENER_PUBLIC_BASE_URL: ${TEAMLINKS_SHORTENER_PUBLIC_BASE_URL:-http://localhost:5006}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - teamlinks-network
    mem_limit: 768m
    cpus: 0.75

volumes:
  postgres_data:

networks:
  teamlinks-network:
    driver: bridge
