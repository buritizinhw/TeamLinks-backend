spring:
  application:
    name: teamlinks-api

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:postgres}:${DATABASE_PORT:5432}/${DATABASE_NAME}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.teamlinks: DEBUG

teamlinks:
  api:
    public-base-url: ${TEAMLINKS_API_PUBLIC_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${TEAMLINKS_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  shortener:
    public-base-url: ${TEAMLINKS_SHORTENER_PUBLIC_BASE_URL:http://localhost:5006}